<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dj</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgba(0, 0, 0, 0);
        }

        #fd {
            height: 160px;
            width: 750px;
            background-color: rgb(0, 0, 0);
            background-image: url(../image/TOP.gif);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100%;
            overflow: hidden;
            /* Garante que o conteúdo que sai do contêiner não seja exibido */
            position: relative;
        }

        #djdj {
            height: 160px;
            width: 750px;
            background-color: rgba(0, 0, 0, 0);
            background-image: url(../image/DJ.gif);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 73%;
            overflow: hidden;
            /* Garante que o conteúdo que sai do contêiner não seja exibido */
            position: absolute;
        }
    </style>
</head>

<body>
    <div id="fd">
        <div id="djdj"></div>

    </div>
    </div>
</body>


</html>
