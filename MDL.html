  <style>
/* 3D Slideshow */
* {
  margin: 0;
  padding: 0;
}

html, body {
  max-width: 100%;
  overflow-x: hidden;
  overflow-y: hidden;
  background-color: #040808;
  background-position: center;
        background-repeat: no-repeat;
        background-size: cover;

}

#slideshow {
  margin: 0 auto;
  padding-top: 50px;
  height: 600px;
  width: 100%;
  background-color: #ffffff00;
  
  box-sizing: border-box;
  margin-top:800px ;
}

.slideshow-title {
  font-family: 'Allerta Stencil';
  font-size: 62px;
  color: #fff;
  margin: 0 auto;
  text-align: center;
  margin-top: 25%;
  letter-spacing: 3px;
  font-weight: 300;
}

.sub-heading {
  padding-top: 50px;
  font-size: 18px;
}
.sub-heading-two {
  font-size: 15px;
}
.sub-heading-three {
  font-size: 13px;
}
.sub-heading-four {
  font-size: 11px;
}
.sub-heading-five {
  font-size: 9px;
}
.sub-heading-six {
  font-size: 7px;
}
.sub-heading-seven {
  font-size: 5px;
}
.sub-heading-eight {
  font-size: 3px;
}
.sub-heading-nine {
  font-size: 1px;
}

.entire-content {
  margin: auto;
  width: 300px; /* Aumenta a largura do contêiner para abrir mais o carrossel */
  perspective: 1500px; /* Aumenta a perspectiva para afastar mais da linha do observador */
  position: relative;
  padding-top: 80px;
}

.content-carrousel {
  width: 100%;
  position: absolute;
  float: right;
  animation: rotar 60s infinite linear; /* Aumenta o tempo de rotação para uma animação mais suave */
  transform-style: preserve-3d;
}

.content-carrousel:hover {
  animation-play-state: paused;
  cursor: pointer;
}

.content-carrousel figure {
  width: 180px; /* Largura das figuras */
  height: 200px; /* Altura das figuras */
  border: 1px solid #3b444b00;
  overflow: hidden;
  position: absolute;
}

.content-carrousel figure:nth-child(1) {
  transform: rotateY(0deg) translateZ(700px); /* Aumenta a distância de tradução no eixo Z */
}
.content-carrousel figure:nth-child(2) {
  transform: rotateY(12deg) translateZ(750px);
}
.content-carrousel figure:nth-child(3) {
  transform: rotateY(24deg) translateZ(700px);
}
.content-carrousel figure:nth-child(4) {
  transform: rotateY(36deg) translateZ(750px);
}
.content-carrousel figure:nth-child(5) {
  transform: rotateY(48deg) translateZ(700px);
}
.content-carrousel figure:nth-child(6) {
  transform: rotateY(60deg) translateZ(750px);
}
.content-carrousel figure:nth-child(7) {
  transform: rotateY(72deg) translateZ(700px);
}
.content-carrousel figure:nth-child(8) {
  transform: rotateY(84deg) translateZ(750px);
}
.content-carrousel figure:nth-child(9) {
  transform: rotateY(96deg) translateZ(700px);
}
.content-carrousel figure:nth-child(10) {
  transform: rotateY(108deg) translateZ(750px);
}
.content-carrousel figure:nth-child(11) {
  transform: rotateY(120deg) translateZ(700px);
}
.content-carrousel figure:nth-child(12) {
  transform: rotateY(132deg) translateZ(750px);
}
.content-carrousel figure:nth-child(13) {
  transform: rotateY(144deg) translateZ(700px);
}
.content-carrousel figure:nth-child(14) {
  transform: rotateY(156deg) translateZ(750px);
}
.content-carrousel figure:nth-child(15) {
  transform: rotateY(168deg) translateZ(700px);
}
.content-carrousel figure:nth-child(16) {
  transform: rotateY(180deg) translateZ(750px);
}
.content-carrousel figure:nth-child(17) {
  transform: rotateY(192deg) translateZ(700px);
}
.content-carrousel figure:nth-child(18) {
  transform: rotateY(204deg) translateZ(750px);
}
.content-carrousel figure:nth-child(19) {
  transform: rotateY(216deg) translateZ(700px);
}
.content-carrousel figure:nth-child(20) {
  transform: rotateY(228deg) translateZ(750px);
}
.content-carrousel figure:nth-child(21) {
  transform: rotateY(240deg) translateZ(700px);
}
.content-carrousel figure:nth-child(22) {
  transform: rotateY(252deg) translateZ(750px);
}
.content-carrousel figure:nth-child(23) {
  transform: rotateY(264deg) translateZ(700px);
}
.content-carrousel figure:nth-child(24) {
  transform: rotateY(276deg) translateZ(750px);
}
.content-carrousel figure:nth-child(25) {
  transform: rotateY(288deg) translateZ(700px);
}
.content-carrousel figure:nth-child(26) {
  transform: rotateY(300deg) translateZ(750px);
}
.content-carrousel figure:nth-child(27) {
  transform: rotateY(312deg) translateZ(750px);
}
.content-carrousel figure:nth-child(28) {
  transform: rotateY(324deg) translateZ(700px);
}
.content-carrousel figure:nth-child(29) {
  transform: rotateY(336deg) translateZ(750px);
}
.content-carrousel figure:nth-child(30) {
  transform: rotateY(348deg) translateZ(800px);
}

.shadow {
  position: absolute;
  box-shadow: 0px 0px 20px 0px #000;
  border-radius: 1px;
}

.content-carrousel img {
  image-rendering: auto;
  transition: all 300ms;
  width: 100%;
  height: 100%;
}

.content-carrousel img:hover {
  transform: scale(1.2);
  transition: all 300ms;
}

@keyframes rotar {
  from {
    transform: rotateY(0deg);
  }
  to {
    transform: rotateY(360deg);
  }
}
