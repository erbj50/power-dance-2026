    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById('audio');
            const rotElements = document.querySelectorAll('.rot');
            const canvasLeft = document.getElementById('vu-meter-left');
            const canvasRight = document.getElementById('vu-meter-right');
            const playPauseButton = document.getElementById('play-pause');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const EQUALIZER = document.getElementById('equalizer');
            const led = document.getElementById('led');
            const led1 = document.getElementById('led1');

            let context;
            let filters = [];
            let analyser;

            // Configuração do botão Play/Pause
            playPauseButton.addEventListener('click', function() {
                if (!context) {
                    context = new(window.AudioContext || window.webkitAudioContext)();
                    const src = context.createMediaElementSource(audio);
                    analyser = context.createAnalyser();

                    // Configuração de volume e VU meter
                    const volumeNode = context.createGain();
                    volumeNode.gain.value = 0.87;

                    const vuMeterGainNode = context.createGain();
                    vuMeterGainNode.gain.value = 0.02;

                    // Configuração dos filtros do equalizador
                    filters = [60, 250, 800, 1000, 2000, 3800].map((freq) => {
                        const filter = context.createBiquadFilter();
                        filter.type = 'peaking';
                        filter.frequency.value = freq;
                        filter.Q.value = Math.sqrt(2);
                        filter.gain.value = 0;
                        return filter;
                    });

                    const canvasCtxLeft = canvasLeft.getContext('2d');
                    const canvasCtxRight = canvasRight.getContext('2d');

                    // Conexão dos nós
                    src.connect(filters[0]);
                    filters.reduce((prev, curr) => prev.connect(curr)).connect(volumeNode);
                    volumeNode.connect(context.destination);
                    volumeNode.connect(vuMeterGainNode);
                    vuMeterGainNode.connect(analyser);

                    analyser.fftSize = 256;
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);

                    function draw() {
                        requestAnimationFrame(draw);
                        analyser.getByteFrequencyData(dataArray);

                        canvasCtxLeft.clearRect(0, 0, canvasLeft.width, canvasLeft.height);
                        canvasCtxRight.clearRect(0, 0, canvasRight.width, canvasRight.height);

                        const value = (dataArray[0] / 255) * 180;
                        drawPointer(canvasCtxLeft, value);
                        drawPointer(canvasCtxRight, value);

                        // Monitorar se o áudio está em estéreo
                        checkStereo();
                    }

                    function drawPointer(ctx, value) {
                        ctx.save();
                        ctx.translate(ctx.canvas.width / 2, ctx.canvas.height / 1.1);
                        ctx.rotate(((value - 90) * Math.PI) / 180);
                        ctx.fillStyle = '#a8fe13';
                        ctx.fillRect(-1.5, -99, 3, 87);
                        ctx.restore();
                    }

                    function checkStereo() {
                        const leftChannel = dataArray.slice(0, dataArray.length / 2);
                        const rightChannel = dataArray.slice(dataArray.length / 2);

                        const leftAvg = leftChannel.reduce((a, b) => a + b, 0) / leftChannel.length;
                        const rightAvg = rightChannel.reduce((a, b) => a + b, 0) / rightChannel.length;

                        if (Math.abs(leftAvg - rightAvg) > 10) {
                            led.classList.add('on');
                            led1.classList.add('on');
                        } else {
                            led.classList.remove('on');
                            led1.classList.remove('on');
                        }
                    }

                    draw();
                }

                if (audio.paused) {
                    // Recarrega o áudio antes de reproduzir
                    audio.src = audio.src;
                    audio.load();
                    audio.play();
                    playIcon.style.display = 'none';
                    pauseIcon.style.display = 'block';
                } else {
                    audio.pause();
                    playIcon.style.display = 'block';
                    pauseIcon.style.display = 'none';
                }
            });

            // Adicionar ou remover a classe "rotating" ao tocar ou pausar o áudio
            audio.addEventListener('play', function() {
                rotElements.forEach(element => {
                    element.classList.add('rotating');
                });
            });

            audio.addEventListener('pause', function() {
                rotElements.forEach(element => {
                    element.classList.remove('rotating');
                });
            });

            // Configuração dos sliders do equalizador
            if (EQUALIZER) {
                const filterInputs = EQUALIZER.querySelectorAll('input[type="range"]');
                const filterValues = EQUALIZER.querySelectorAll('span');

                filterInputs.forEach((input, index) => {
                    input.addEventListener('input', () => {
                        const value = parseInt(input.value, 10);
                        filters[index].gain.value = value;
                        filterValues[index].innerText = `${value} dB`;
                    });
                });
            } else {
                console.error("Elemento EQUALIZER não encontrado.");
            }
        });
    </script>
