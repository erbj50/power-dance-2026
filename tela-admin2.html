<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Power World News Ads</title>
    <link rel="icon" href="./image/favicon.png" type="image/png">
    
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --card-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --border-color: #444;
            --primary-color: #ff6b35;
            --success-color: #22c55e;
            --yellow-color: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 135px;
        }

        .preview-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .ad-preview-box {
            width: 100%;
            aspect-ratio: 16 / 11;
            border: 2px dashed var(--primary-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: rgba(0,0,0,0.6);
            position: relative;
        }

        /* Torna a URL da Imagem Autoajustável dentro de qualquer container */
        .ad-preview-box img, .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .form-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
        }

        label {
            font-weight: bold;
            color: #ccc;
            font-size: 0.9rem; 
        }

        input, textarea {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: 2px solid var(--primary-color);
        }

        /* Estilos especiais solicitados */
        #adTitle {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--yellow-color);
        }

        #adPrice {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
        }

        textarea {
            resize: none;
            height: 55px;
            font-size: 0.9rem;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 2px;
            box-shadow: 0 4px 10px rgba(255, 107, 53, 0.2);
        }

        button:hover {
            background-color: #e55a2b;
        }

        .progress-container {
            width: 100%;
            background-color: #333;
            border-radius: 6px;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 22px;
            background-color: var(--success-color);
            text-align: center;
            line-height: 22px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            transition: width 0.2s;
        }

        .gallery-section {
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
            background-color: #161616;
            border-top: 2px solid var(--border-color);
            padding: 6px 12px;
            box-sizing: border-box;
            z-index: 100;
        }

        .gallery-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 4px;
        }

        .gallery-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scroll-behavior: smooth;
        }

        .gallery-grid::-webkit-scrollbar {
            height: 5px;
        }
        .gallery-grid::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .gallery-item {
            min-width: 80px;
            max-width: 80px;
            height: 100px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .gallery-item.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 107, 53, 0.6);
        }

        .gallery-item .img-container {
            width: 100%;
            height: 65px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-badge {
            position: absolute;
            top: 2px;
            left: 2px;
            background: rgba(0,0,0,0.85);
            color: var(--primary-color);
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 4px;
            font-size: 0.65rem;
            z-index: 2;
        }

        .gallery-item .item-title {
            font-size: 0.65rem;
            text-align: center;
            padding: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="preview-section">
            <div class="ad-preview-box" id="adPreviewBox">
                <span style="color:#666; font-size: 1rem;">Nenhuma imagem carregada</span>
            </div>
        </div>

        <div class="form-section">
            <div class="form-row">
                <div class="form-group" style="flex: 0 0 110px;">
                    <label for="adId">ID (1-150):</label>
                    <input type="number" id="adId" min="1" max="150" value="1" required>
                </div>
                <div class="form-group">
                    <label for="adPrice">Preço do Produto:</label>
                    <input type="text" id="adPrice" placeholder="R$ 0,00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="adTitle">Título (Máx 40car.):</label>
                <input type="text" id="adTitle" maxlength="40" placeholder="Ex: Mini Projetor Portátil" required>
            </div>

            <div class="form-group">
                <label for="adDescription">Descrição (Máx 200car.):</label>
                <textarea id="adDescription" maxlength="200" placeholder="Breve descrição dos achadinhos..."></textarea>
            </div>

            <div class="form-group">
                <label for="adLink">Link de Afiliado Shopee:</label>
                <input type="url" id="adLink" placeholder="https://shope.ee/..." required>
            </div>

            <div class="form-group">
                <label for="imageUrl">URL da Imagem:</label>
                <input type="url" id="imageUrl" placeholder="https://cf.shopee.com.br/file/...">
            </div>

            <button type="button" id="btnUpdate">Atualizar Container</button>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>
    </div>

    <div class="gallery-section">
        <div class="gallery-title">Lista de Containers Ativos (1 a 150)</div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVHhRAdxIW2p0vWZuWsILrXzsIuLJmd08",
            authDomain: "pwn-afiliados-urls.firebaseapp.com",
            projectId: "pwn-afiliados-urls",
            storageBucket: "pwn-afiliados-urls.firebasestorage.app",
            messagingSenderId: "228959052596",
            appId: "1:228959052596:web:36ea4e83a9ca6ece293b61"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let adsData = {};

        const adIdInput = document.getElementById('adId');
        const adPriceInput = document.getElementById('adPrice');
        const adLinkInput = document.getElementById('adLink');
        const adTitleInput = document.getElementById('adTitle');
        const adDescriptionInput = document.getElementById('adDescription');
        const imageUrlInput = document.getElementById('imageUrl');
        const btnUpdate = document.getElementById('btnUpdate');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const adPreviewBox = document.getElementById('adPreviewBox');
        const galleryGrid = document.getElementById('galleryGrid');

        // Criação dinâmica da galeria de 1 a 150 elementos economizando nós de memória
        for (let i = 1; i <= 150; i++) {
            let item = document.createElement('div');
            item.className = 'gallery-item';
            item.id = `gallery-item-${i}`;
            item.innerHTML = `
                <div class="gallery-badge">#${i}</div>
                <div class="img-container">
                    <img src="" alt="" id="img-gal-${i}" style="display:none;">
                    <span style="font-size:0.55rem; color:#444;" id="placeholder-gal-${i}">Vazio</span>
                </div>
                <div class="item-title" id="title-gal-${i}">Sem produto</div>
            `;
            item.addEventListener('click', () => selectContainerFromGallery(i));
            galleryGrid.appendChild(item);
        }

        const adsRef = ref(db, 'shopee_ads');
        onValue(adsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                adsData = data;
                Object.keys(data).forEach(id => {
                    const ad = data[id];
                    if(id > 150) return; // Proteção contra estouro de limite
                    
                    const imgTag = document.getElementById(`img-gal-${id}`);
                    const placeholder = document.getElementById(`placeholder-gal-${id}`);
                    const titleTag = document.getElementById(`title-gal-${id}`);

                    if (imgTag && ad.image) {
                        imgTag.src = ad.image;
                        imgTag.style.display = 'block';
                        placeholder.style.display = 'none';
                    } else if (imgTag) {
                        imgTag.style.display = 'none';
                        placeholder.style.display = 'block';
                    }
                    if (titleTag && ad.title) {
                        titleTag.innerText = ad.title;
                    }
                });
                updateFormAndPreview(adIdInput.value);
            }
        });

        function selectContainerFromGallery(id) {
            if(id < 1 || id > 150) return;
            adIdInput.value = id;
            document.querySelectorAll('.gallery-item').forEach(el => el.classList.remove('active'));
            const currentItem = document.getElementById(`gallery-item-${id}`);
            if (currentItem) {
                currentItem.classList.add('active');
                currentItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            updateFormAndPreview(id);
        }

        function updateFormAndPreview(id) {
            const currentAd = adsData[id];
            if (currentAd) {
                adLinkInput.value = currentAd.link || '';
                adTitleInput.value = currentAd.title || '';
                adPriceInput.value = currentAd.price || '';
                adDescriptionInput.value = currentAd.description || '';
                imageUrlInput.value = currentAd.image || '';
                
                if (currentAd.image) {
                    adPreviewBox.innerHTML = `<img src="${currentAd.image}" alt="Preview">`;
                } else {
                    adPreviewBox.innerHTML = `<span style="color:#666; font-size:1rem;">Nenhuma imagem carregada</span>`;
                }
            } else {
                adLinkInput.value = '';
                adTitleInput.value = '';
                adPriceInput.value = '';
                adDescriptionInput.value = '';
                imageUrlInput.value = '';
                adPreviewBox.innerHTML = `<span style="color:#666; font-size:1rem;">Nenhuma imagem carregada</span>`;
            }
        }

        adIdInput.addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            if (val >= 1 && val <= 150) {
                selectContainerFromGallery(val);
            }
        });

        imageUrlInput.addEventListener('input', (e) => {
            const url = e.target.value.trim();
            if (url) {
                adPreviewBox.innerHTML = `<img src="${url}" alt="Preview">`;
            } else {
                adPreviewBox.innerHTML = `<span style="color:#666; font-size:1rem;">Nenhuma imagem carregada</span>`;
            }
        });

        // Máscara ultra leve e manual para o campo de moeda R$
        adPriceInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, "");
            if(value === "") { e.target.value = ""; return; }
            value = (value / 100).toFixed(2) + "";
            value = value.replace(".", ",");
            value = value.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            e.target.value = "R$ " + value;
        });

        btnUpdate.addEventListener('click', () => {
            const id = adIdInput.value;
            const link = adLinkInput.value.trim();
            const title = adTitleInput.value.trim();
            const price = adPriceInput.value.trim();
            const description = adDescriptionInput.value.trim();
            const finalUrl = imageUrlInput.value.trim();

            if (!id || id < 1 || id > 150) {
                alert("Por favor, selecione um ID válido de 1 a 150.");
                return;
            }
            if (!link || !title || !price) {
                alert("Preencha os campos obrigatórios: Link, Título e Preço.");
                return;
            }

            progressContainer.style.display = 'block';
            progressBar.style.width = '50%';
            progressBar.style.backgroundColor = 'var(--primary-color)';
            progressBar.innerText = 'Gravando...';

            set(ref(db, 'shopee_ads/' + id), {
                id: parseInt(id),
                link: link,
                title: title,
                price: price,
                description: description,
                image: finalUrl
            })
            .then(() => {
                progressBar.style.width = '100%';
                progressBar.innerText = "Sincronizado! 🎉";
                progressBar.style.backgroundColor = "#10b981"; 
                
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                }, 1500);
            })
            .catch((error) => {
                console.error(error);
                alert("Erro ao salvar no Firebase.");
                progressContainer.style.display = 'none';
            });
        });
    </script>
</body>
</html>
