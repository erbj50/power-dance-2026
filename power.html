<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.39, maximum-scale=0.39, user-scalable=39">
    <title>WEB RADIO POWER DANCE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        .container {
            width: 995px;
            height: 160px;
            display: flex;
            align-items: center;
            background-image: url(./raiden.gif);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            margin-top: 10px;
            border: 1px solid #031bf0f8;
        }

        #L, #R {
            width: 120px;
            height: 160px;
            background-color: rgb(0, 0, 0);
            background-image: url(./image/danceg.gif);
            background-size: 90%;
            background-repeat: no-repeat;
            background-position: center;
            border: 1px solid #03ccf02a;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #master-cloc {
            width: 750px;
            height: 160px;
            margin: auto;
            position: relative;
            align-items: center;
            background-image: url(./raiden.gif);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .element {
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            color: white;
        }

        .element.active {
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #cent {
            overflow: hidden;
            width: 995px;
            height: 1560px;
            background-color: rgba(255, 166, 0, 0.027);
            position: relative;
        }

        #sideL {
            position: absolute;
            width: 0;
            height: 100%;
            top: 0;
            background-color: rgb(0, 0, 0);
            transition: width 0.5s ease;
            overflow: hidden;
            left: 0;
        }

        #sideR {
            position: absolute;
            width: 0;
            height: 100%;
            top: 0;
            background-color: rgba(0, 0, 0, 0);
            transition: width 0.5s ease;
            overflow: hidden;
            right: 0;
        }

        .side-iframe-L, .side-iframe-R {
            width: 100%;
            height: 100%;
            border: none;
        }

        .expanded {
            width: 100% !important;
        }

        /* Estilos de Animação e Cores Neon */
        .neon-text-large {
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            font-weight: bold;
            animation: neonColorChange 8s infinite linear, neonGlow 8s infinite;
        }

        #powerDance, #bejota12-text {
            font-size: 88px;
        }

        @font-face {
            font-family: 'digital-clock-font';
            src: url('./ds-digital/DS-DIGI.TTF') format('truetype');
        }

        #cloc.content {
            color: rgb(253, 253, 253);
            font-size: 100px;
            font-family: 'digital-clock-font';
            font-weight: bold;
            text-shadow: 0 0 40px rgb(11, 7, 231), 0 0 60px rgb(0, 47, 255);
        }

        #calendario-dia {
            color: rgb(255, 255, 255);
            font-size: 84px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            text-shadow: 0 0 40px rgb(11, 75, 238), 0 0 60px rgb(32, 8, 245);
        }

        #calendario-data {
            color: rgb(231, 255, 12);
            font-size: 84px;
            font-weight: bold;
            text-shadow: 0 0 40px rgb(11, 7, 231), 0 0 60px rgb(0, 47, 255);
        }

        @keyframes neonColorChange {
            0% { color: lime; }
            25% { color: cyan; }
            50% { color: red; }
            75% { color: blue; }
            100% { color: rgb(166, 255, 0); }
        }

        @keyframes neonGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.562), 0 0 30px rgba(252, 250, 250, 0.192); }
            50% { text-shadow: 0 0 40px lime, 0 0 60px rgb(153, 30, 153); }
        }

        /* Classes de Texto Neon Dinâmicas */
        .neon-style-64 {
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            font-weight: bold;
            animation: neonColorChange 5s infinite linear, neonGlow 5s infinite;
            font-size: 64px;
        }

        .neon-style-70 {
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            font-weight: bold;
            animation: neonColorChange 5s infinite linear, neonGlow 5s infinite;
            font-size: 70px;
        }

        .neon-style-86 {
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            font-weight: bold;
            animation: neonColorChange 5s infinite linear, neonGlow 5s infinite;
            font-size: 86px;
        }

        #bejota1-container, #bejota3-container {
            font-size: 54px;
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            font-weight: bold;
            animation: neonColorChange 5s infinite linear, neonGlow 5s infinite;
        }

        #bejota4-container {
            color: rgba(252, 216, 11, 0);
        }

        #L1 { display: none; }
        #L2 { display: block; }
    </style>
</head>

<body>
    <div class="container">
        <button id="L"></button>
        <div id="master-cloc">
            <div id="cloc" class="content element active">00:00:00</div>
            <div id="bejota8-1" class="element"><iframe src="./html/index3.html"></iframe></div>
            <div id="bem-vindos" class="element neon-style-86">BEM VINDO</div>
            <div id="web-radio" class="element neon-style-86">WEB RADIO</div>
            <div id="powerDance" class="element neon-text-large">POWER DANCE</div>
            <div id="calendario-data" class="element">21/06/2026</div>
            <div id="calendario-dia" class="element">QUARTA-FEIRA</div>
            <div id="bejota1-container" class="element"><iframe src="./html/index8.html"></iframe></div>
            <div id="bejota2" class="element neon-style-70">CAMPO GRANDE MS</div>
            <div id="bejota4-container" class="element"><iframe src="./html/index4.html"></iframe></div>
            <div id="bejota8-2" class="element"><iframe src="./html/index12.html"></iframe></div>
            <div id="bejota5" class="element"><iframe src="./html/index7.html"></iframe></div>
            <div id="bejota6" class="element neon-style-64"><iframe src="./html/index3.html"></iframe></div>
            <div id="bejota7" class="element neon-style-64"><iframe src="./html/index12.html"></iframe></div>
            <div id="bejota8-3" class="element neon-style-64"><iframe src="./html/index3.html"></iframe></div>

            <div id="bejota9-1" class="element neon-style-64"><iframe src="./html/index9.html"></iframe></div>
            <div id="bejota10-1" class="element neon-style-64"><iframe src="./html/index3.html"></iframe></div>
            <div id="bejota11-1" class="element"><iframe src="./html/index8.html"></iframe></div>
            <div id="bejota12-1" class="element neon-text-large"><iframe src="./html/index3.html"></iframe></div>
            <div id="bejota13-1" class="element neon-style-70"><iframe src="./html/index12.html"></iframe></div>
            <div id="bejota14-1" class="element neon-style-70"><iframe src="./html/index3.html"></iframe></div>
            <div id="bejota15" class="element"><iframe src="./html/index8.html"></iframe></div>

            <div id="bejota9-iframe-container" class="element">
                <iframe width="600" height="150" src="./html/index1.html"></iframe>
            </div>
            
            <div id="bejota10-2" class="element"><iframe src="./html/index5.html"></iframe></div>
            <div id="bejota11-2" class="element"><iframe src="./html/index12.html"></iframe></div>
            <div id="bejota12-text" class="element neon-text-large">DJ ROBERT BJ</div>
            <div id="bejota13-text" class="element neon-style-70">CAMPO GRANDE MS</div>
            <div id="bejota14-text" class="element neon-style-70">CAPITAL DO PANTANAL</div>
        </div>
        <button id="R"></button>
    </div>

    <div id="cent">
        <div id="sideL">
            <iframe id="L2" class="side-iframe-L" src="./mdl.html"></iframe>
            <iframe id="L1" class="side-iframe-L" src="./tela.html"></iframe>
        </div>
        <div id="sideR">
            <iframe class="side-iframe-R" width="990px" height="100%" src="./landing.html"></iframe>
        </div>
        <iframe src="./play.html"></iframe>
    </div>

<script>
    // Atualiza o relógio e calendário
    function updateClock() {
        const clockElement = document.getElementById('cloc');
        const calendarioDataElement = document.getElementById('calendario-data');
        const calendarioDiaElement = document.getElementById('calendario-dia');
        const now = new Date();

        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        clockElement.textContent = `${hours}:${minutes}:${seconds}`;

        const days = ['DOMINGO', 'SEGUNDA-FEIRA', 'TERÇA-FEIRA', 'QUARTA-FEIRA', 'QUINTA-FEIRA', 'SEXTA-FEIRA', 'SÁBADO'];
        const day = days[now.getDay()];
        const date = now.toLocaleDateString('pt-BR');
        calendarioDataElement.textContent = date;
        calendarioDiaElement.textContent = day;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // Alterna os elementos .element a cada 40s
    const elements = document.querySelectorAll('.element');
    let currentIndex = 0;

    function changeElement() {
        elements.forEach((el, index) => {
            el.classList.toggle('active', index === currentIndex);
        });
        currentIndex = (currentIndex + 1) % elements.length;
    }

    setInterval(changeElement, 40000);

    // Botões laterais
    document.getElementById('L').addEventListener('click', () => {
        document.getElementById('sideL').classList.toggle('expanded');
    });

    document.getElementById('R').addEventListener('click', () => {
        document.getElementById('sideR').classList.toggle('expanded');
    });

    // Verifica a hora para trocar iframes e imagem de fundo dos botões
    function checkTimeAndToggle() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();

        const btnL = document.getElementById('L');
        const btnR = document.getElementById('R');
        const frameL1 = document.getElementById('L1');
        const frameL2 = document.getElementById('L2');

        if ((hours === 0 && minutes === 7) || (hours >= 0 && hours < 5)) {
            frameL1.style.display = 'none';
            frameL2.style.display = 'block';
            btnL.style.backgroundImage = "url('./image/love.gif')";
            btnR.style.backgroundImage = "url('./image/love.gif')";
        } else if (hours >= 5) {
            frameL1.style.display = 'block';
            frameL2.style.display = 'none';
            btnL.style.backgroundImage = "url('./image/danceg1.gif')";
            btnR.style.backgroundImage = "url('./image/danceg1.gif')";
        }
    }

    setInterval(checkTimeAndToggle, 5000);
    checkTimeAndToggle();

    // Lógica SideL: Abre após 20s (20000ms), fecha após 3min, repete
    function toggleSideL(open) {
        const sideL = document.getElementById('sideL');
        if (open) {
            sideL.classList.add('expanded');
        } else {
            sideL.classList.remove('expanded');
        }
    }

    setTimeout(function startSideLCycle() {
        toggleSideL(true); // Abre o painel
        setTimeout(function closeSideL() {
            toggleSideL(false); // Fecha após 3 minutos (180000ms)
            setTimeout(startSideLCycle, 20000); // Aguarda mais 20 segundos para reabrir
        }, 180000); 
    }, 20000); // Espera inicial de 20 segundos correta
</script>



</body>


<script>
    // Bloqueio de clique direito e F12 para proteção básica do código
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }
    });
</script>

</html>
