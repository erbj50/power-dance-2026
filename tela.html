<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Principal</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #t-la {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            max-width: 920px;
            max-height: 930px;
            position: absolute;
            margin-left: 20px;
            border: 10px solid rgb(3, 0, 0);
        }

        .if {
            background-color: black;
            border: 10px solid rgb(0, 0, 0);
            width: 100%;
            height: 100%;
        }

        #eudj {
            margin: 0;
            padding: 0;
            width: 900px;
            height: 460px;
            margin-left: 10px;
            margin-top: 50px;
        }

        /* IFRAMES - Posicionados em locais diferentes para não sobrepor */
        #if-samp1 {
            display: none;
            position: absolute;
            z-index: 1;
            margin: 0;
            padding: 0;
            left: 10px;
            margin-top: 10px;
            top: 920px;
        }

        #if-samp2 {
            display: none;
            position: absolute;
            z-index: 1;
            margin: 0;
            padding: 0;
            left: 10px;
            margin-top: 10px;
            top: 920px;
        }

        /* BOTÕES - Separados para que cada um tenha seu espaço de clique */
        #do-samp1 {
            height: 80px;
            width: 250px;
            border-radius: 0%;
            border: none;
            background-color: rgba(255, 0, 0, 0);
            position: absolute;
            z-index: 1;
            left: 60px; /* Ajustado para dar espaço ao samp2 */
            top: 1430px;
            cursor: pointer;
        }

        #do-samp2 {
            height: 80px;
            width: 250px;
            border-radius: 0%;
            border: none;
            background-color: rgba(172, 255, 47, 0);
            position: absolute;
            z-index: 1;
            right: 60px;
            top: 1430px;
            cursor: pointer;
        }

        #admin-bt {
            height: 140px;
            width: 670px;
            border-radius: 0%;
            border: none;
            position: absolute;
            z-index: 1;
            left: 140px;
            top: 925px;
            opacity: 100%;
        }
       
        .bg-gf {
            background-color: rgba(255, 0, 0, 0.082);
            background-image: url('./wavv.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Estilo do Popup */
        #admin-popup {
            display: none;
            position: fixed;
            width: 600px;
            height: 600px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid white;
            z-index: 1000;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #admin-popup button {
            width: 200px;
            height: 80px;
            margin: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        #admin-1 {
            background-color: orange;
        }

        #admin-2 {
            background-color: purple;
        }
    </style>
</head>

<body>
    <div id="t-la">
        <iframe class="if" src="./tela-carrossel.html"></iframe>
        <img id="eudj" src="./image/djdj.gif" alt="DJ">

        <button class="bg-gf" id="admin-bt"></button>
        
        <iframe id="if-samp1" class="samp-iframe1" width="895" height="605" src="./samp1.html"></iframe>
        <iframe id="if-samp2" class="samp-iframe2" width="895" height="605" src="./samp2.html"></iframe>
        
        <button id="do-samp1"></button>
        <button id="do-samp2"></button>
         
        <h1>SAMPLE PADS</h1>
        
        <div id="admin-popup">
            <button id="admin-1">ADMIN 1</button>
            <button id="admin-2">ADMIN 2</button>
        </div>
    </div>

    <script>
        // Bloqueios de segurança
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
        });

        // Mapeamento das Variáveis do SAMP 1
        const btnSamp1 = document.getElementById('do-samp1');
        const ifSamp1 = document.getElementById('if-samp1');
        
        // Mapeamento das Variáveis do SAMP 2
        const btnSamp2 = document.getElementById('do-samp2');
        const ifSamp2 = document.getElementById('if-samp2');

        // Logica Funcional Independente do SAMP 1
        btnSamp1.addEventListener('click', function() {
            this.style.display = 'none';
            ifSamp1.style.display = 'block';
            setTimeout(() => {
                this.style.display = 'block';
                ifSamp1.style.display = 'none';
            }, 10000);
        });

        // Logica Funcional Independente do SAMP 2
        btnSamp2.addEventListener('click', function() {
            this.style.display = 'none';
            ifSamp2.style.display = 'block';
            setTimeout(() => {
                this.style.display = 'block';
                ifSamp2.style.display = 'none';
            }, 10000);
        });

        // Controle do botão Admin (Compatível com PC e Celular)
        const adminButton = document.getElementById('admin-bt');
        const adminPopup = document.getElementById('admin-popup');
        const admin1Button = document.getElementById('admin-1');
        const admin2Button = document.getElementById('admin-2');

        let pressTimer;

        function startPress() {
            pressTimer = setTimeout(() => {
                adminPopup.style.display = 'flex'; 
            }, 20000); 
        }

        function cancelPress() {
            clearTimeout(pressTimer);
        }

        // Eventos de clique longo (Mouse)
        adminButton.addEventListener('mousedown', startPress);
        adminButton.addEventListener('mouseup', cancelPress);
        adminButton.addEventListener('mouseleave', cancelPress);

        // Eventos de clique longo (Toque Celular)
        adminButton.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            startPress();
        });
        adminButton.addEventListener('touchend', cancelPress);
        adminButton.addEventListener('touchcancel', cancelPress);

        // Redirecionamentos do Painel Admin
        admin1Button.addEventListener('click', () => {
            adminPopup.style.display = 'none';
            window.location.href = './tela-admin1.html'; 
        });

        admin2Button.addEventListener('click', () => {
            adminPopup.style.display = 'none';
            window.location.href = './tela-admin2.html'; 
        });
    </script>
</body>

</html>
