<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Principal</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #t-la {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            max-width: 920px;
            max-height: 930px;
            position: absolute;
            margin-left: 20px;
            border: 10px solid rgb(3, 0, 0);
        }

        .if {
            background-color: black;
            border: 10px solid rgb(0, 0, 0);
            width: 100%;
            height: 100%;
        }

        #eudj {
            margin: 0;
            padding: 0;
            width: 900px;
            height: 460px;
            margin-left: 10px;
            margin-top: 50px;
        }

        #if-samp {
            display: none;
            position: absolute;
            z-index: 1;
            margin: 0;
            padding: 0;
            left: 10px;
            margin-top: 50px;
            top: 920px;
        }

        #do-samp {
            height: 250px;
            width: 250px;
            border-radius: 50%;
            border: none;
            background-color: transparent;
            position: absolute;
            z-index: 1;
            right: 60px;
            top: 1090px;
            cursor: pointer;
        }

        #admin-bt {
            height: 90px;
            width: 650px;
            border-radius: 0%;
            border: none;
            background-color: rgb(0, 162, 255);
            position: absolute;
            z-index: 1;
            left: 160px;
            top: 920px;
            opacity: 25%;
        }

        /* Estilo do Popup */
        #admin-popup {
            display: none;
            position: fixed;
            width: 600px;
            height: 600px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid white;
            z-index: 1000;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #admin-popup button {
            width: 200px;
            height: 80px;
            margin: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        #admin-1 {
            background-color: orange;
        }

        #admin-2 {
            background-color: purple;
        }
    </style>
</head>

<body>
    <div id="t-la">
        <iframe class="if" src="./metadata.html"></iframe>
        <img id="eudj" src="./image/djdj.gif" alt="DJ">
        <iframe id="if-samp" class="samp-iframe" width="895" height="505" src="./samp.html"></iframe>
        <button id="do-samp"></button>
        <button id="admin-bt"></button>

        <!-- Popup -->
        <div id="admin-popup">
            <button id="admin-1">ADMIN 1</button>
            <button id="admin-2">ADMIN 2</button>
        </div>
    </div>

    <script>
        // Bloqueios de segurança
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
        });

        // Controle do botão SAMP
        const btnSamp = document.getElementById('do-samp');
        const ifSamp = document.getElementById('if-samp');

        btnSamp.addEventListener('click', function() {
            this.style.display = 'none';
            ifSamp.style.display = 'block';
            setTimeout(() => {
                this.style.display = 'block';
                ifSamp.style.display = 'none';
            }, 10000);
        });

      // Controle do botão Admin (Compatível com PC e Celular)
const adminButton = document.getElementById('admin-bt');
const adminPopup = document.getElementById('admin-popup');
const admin1Button = document.getElementById('admin-1');
const admin2Button = document.getElementById('admin-2');

let pressTimer;

// Função para iniciar a contagem (20 segundos)
function startPress() {
    pressTimer = setTimeout(() => {
        adminPopup.style.display = 'flex';
    }, 20000); // 20 segundos
}

// Função para cancelar se soltar o botão antes do tempo
function cancelPress() {
    clearTimeout(pressTimer);
}

// Eventos para Computador (Mouse)
adminButton.addEventListener('mousedown', startPress);
adminButton.addEventListener('mouseup', cancelPress);
adminButton.addEventListener('mouseleave', cancelPress);

// Eventos para Celular (Toque na tela)
adminButton.addEventListener('touchstart', (e) => {
    e.preventDefault(); // Evita zoom ou comportamentos estranhos no celular
    startPress();
});
adminButton.addEventListener('touchend', cancelPress);
adminButton.addEventListener('touchcancel', cancelPress);

admin1Button.addEventListener('click', () => {
    window.open('./tela-admin1.html', '_blank');
    adminPopup.style.display = 'none';
});

admin2Button.addEventListener('click', () => {
    window.open('./tela-admin2.html', '_blank');
    adminPopup.style.display = 'none';
});
    </script>
</body>

</html>
