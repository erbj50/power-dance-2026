<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Dance 2025</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgba(0, 0, 2, 0);
        }

        #fd {
            height: 160px;
            width: 750px;
            background-color: rgba(0, 0, 5, 0);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 150%;
            overflow: hidden;
            /* Garante que o conteúdo fora do contêiner não seja exibido */
            position: relative;
            display: flex;
            align-items: center;
            /* Centraliza o conteúdo verticalmente */
            justify-content: center;
            /* Centraliza o conteúdo horizontalmente */
        }

        #dança {
            margin: 0%;
            padding: 0%;
            width: 140px;
            height: 160px;
            background-color: rgba(243, 9, 212, 0);
            background-image: url(../image/DANÇARINO2.gif);
            background-repeat: no-repeat;
            background-position: center;
            background-size: 86%;
            overflow: hidden;
            /* Garante que o conteúdo fora do contêiner não seja exibido */
            position: relative;
            display: flex;
        }

        .scrolling-text {
            display: flex;
            align-items: center;
            white-space: nowrap;
            /* Garante que o texto não quebre linhas */
            position: absolute;
            animation: scroll 48s linear infinite;
            /* Animação para rolar o conteúdo */
            font-size: 40px;
            color: white;
            text-shadow: 1px 5px 5px #0630e9;
        }

        .red {
            color: red;
        }

        .green {
            color: rgb(179, 255, 0);
        }

        .blue {
            color: rgb(77, 112, 217);
        }

        .orange {
            color: rgb(255, 174, 0);
        }

        .purple {
            color: purple;
        }

        .yellow {
            color: rgb(221, 245, 7);
        }

        .white {
            color: rgb(255, 255, 255);
        }

        .MRQ {
            width: 100px;
            height: 100px;
            margin-left: 20px;
        }

        @keyframes scroll {
            from {
                transform: translateX(100%);
                /* Começa fora do contêiner, à direita */
            }
            to {
                transform: translateX(-100%);
                /* Sai fora do contêiner, à esquerda */
            }
        }
    </style>
</head>

<body>
    <div id="fd">
        <div id="dança"></div>
        <div class="scrolling-text">
            <h1>
                &nbsp;&nbsp;&nbsp;
                <span class="white">ANUNCIE</span> &nbsp;&nbsp;
                <span class="white">AQUI!</span> &nbsp;&nbsp;
                <span class="yellow">NA</span> &nbsp;&nbsp;
                <span class="blue">POWER</span>&nbsp;&nbsp;
                <span class="green">DANCE</span> &nbsp;&nbsp;&nbsp;
                <span class="yellow">É</span> &nbsp;&nbsp;
                <span class="white">SÓ</span> &nbsp; &nbsp;
                <span class="red">CLICAR</span>&nbsp;&nbsp;&nbsp; &nbsp;
                <span class="orange">NA </span> &nbsp;&nbsp;
                <span class="white">TELA ANIMADA</span>&nbsp;&nbsp;
                <span class="yellow">E</span>&nbsp;&nbsp;
                <span class="yellow">SERA</span>&nbsp;&nbsp;&nbsp;
                <span class="orange">DIRECIONADO</span>&nbsp;&nbsp;&nbsp;
                <span class="orange">PARA</span>&nbsp;
                <span class="yellow">CONTRATAR</span> &nbsp;&nbsp;.&nbsp;&nbsp;
                <span class="green">DIVULGUE</span> &nbsp;
                <span class="white">A</span>&nbsp;
                <span class="red">SUA</span>&nbsp;
                <span class="orange">MARCA</span>&nbsp;&nbsp;&nbsp;.&nbsp;&nbsp;
                <span class="blue">SAIA</span> &nbsp;
                <span class="green">NA</span> &nbsp;
                <span class="yellow">FRENTE</span>&nbsp;&nbsp;&nbsp;.&nbsp;&nbsp;
                <span class="red">E</span>&nbsp;&nbsp;
                <span class="orange">TENHA</span>&nbsp;
                <span class="blue">SUCESSO!</span> &nbsp;&nbsp;

                <span class="blue"></span>
            </h1>
        </div>
    </div>
</body>

</html>
