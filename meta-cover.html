<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>meta cover</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .album-box {
            width: 100%;
            max-width: 650px;
            height: 650px;
            background-color: transparent;
            background-image: url('./logodj.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-top: 60px;
            display: block;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background-color: transparent;
        }

        .info-footer {
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            padding: 10px;
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
        }

        .scroll-text {
            white-space: nowrap;
            display: inline-block;
            animation: slideText 15s linear infinite;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }

        @keyframes slideText {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        @media (max-width: 400px) {
            .album-box {
                max-width: 100%;
                height: auto;
                aspect-ratio: 1/1;
            }
            .info-footer {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="album-box">
        <img 
            id="coverImage" 
            src="./logodj.gif"
            alt="Capa do álbum" 
            class="cover-image"
            loading="lazy"
        >
        <div id="infoFooter" class="info-footer">
            <div id="infoText" class="scroll-text">
                <i class="fa-solid fa-microphone"></i> Carregando... &nbsp;&nbsp;
                <i class="fa-solid fa-headphones"></i> WEB RADIO POWER DANCE Campo Grande MS
            </div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        const novaRadioUrl = 'http://voxhd.com.br/api-json/Nzg5NCsx';
        const vercelProxy = 'https://metadapower.vercel.app/api/player?url=';
        const apiURL = vercelProxy + novaRadioUrl;

        function isValidUrl(url) {
            try {
                new URL(url);
                return url.startsWith('http://') || url.startsWith('https://');
            } catch (e) { return false; }
        }

        function atualizarInfo() {
            $.getJSON(apiURL)
                .done(function(data) {
                    let musica = "WEB RADIO POWER DANCE - Campo Grande MS";
                    if (data && data.musica_atual) { musica = String(data.musica_atual); }

                    let artista = "WEB RADIO POWER DANCE";
                    let titulo = "Campo Grande MS";

                    if (musica.includes(" - ")) {
                        const partes = musica.split(" - ");
                        artista = partes[0] ? partes[0].trim() : artista;
                        titulo = partes[1] ? partes[1].trim() : titulo;
                    } else { artista = musica; }

                    const genero = data.genero || "Sem gênero";
                    const capa = data.capa_musica;

                    const infoHtml = `
                        <i class="fa-solid fa-microphone"></i> ${artista} &nbsp;&nbsp;
                        <i class="fa-solid fa-music"></i> ${titulo} &nbsp;&nbsp;
                        <i class="fa-solid fa-headphones"></i> ${genero} &nbsp;&nbsp;
                        <strong>WEB RADIO POWER DANCE Campo Grande MS</strong>
                    `;
                    $('#infoText').html(infoHtml);

                    if (isValidUrl(capa)) {
                        const img = new Image();
                        img.onload = () => {
                            $('#coverImage').fadeOut(200, function() { $(this).attr('src', capa).fadeIn(200); });
                        };
                        img.onerror = () => {
                            $('#coverImage').fadeOut(200, function() { $(this).attr('src', './logodj.gif').fadeIn(200); });
                        };
                        img.src = capa;
                    } else {
                        $('#coverImage').fadeOut(200, function() { $(this).attr('src', './logodj.gif').fadeIn(200); });
                    }
                })
                .fail(function() {
                    $('#infoText').html(`<i class="fa-solid fa-exclamation-triangle"></i> Conexão indisponível ou erro no Proxy API.`);
                    $('#coverImage').fadeOut(200, function() { $(this).attr('src', './logodj.gif').fadeIn(200); });
                });
        }

        atualizarInfo();
        setInterval(atualizarInfo, 5000);
    });
</script>
</body>

</html>
