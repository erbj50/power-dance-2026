<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Cover - Apenas Texto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent; /* Permite ver a imagem que já está no carrossel */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .carousel-meta-container {
            width: 100%;
            max-width: 750px;
            height: 750px;
            position: relative;
        }
        #metaCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="carousel-meta-container">
        <canvas id="metaCanvas" width="750" height="750"></canvas>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            const apiURL = 'https://metadapower.vercel.app/api/player?url=http://voxhd.com.br/api-json/Nzg5NCsx';
            const canvas = document.getElementById('metaCanvas');
            const ctx = canvas.getContext('2d');

            // Função focada APENAS em desenhar o texto e a barra inferior
            function drawMetaToCanvas(artista, titulo) {
                // Limpa o canvas mantendo a transparência para revelar o fundo real do carrossel
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Barra inferior semi-transparente para dar leitura ao texto
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, canvas.height - 110, canvas.width, 110);

                // Texto do Artista
                ctx.fillStyle = '#00ffcc';
                ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.fillText(artista.toUpperCase(), canvas.width / 2, canvas.height - 65);

                // Texto da Música
                ctx.fillStyle = '#ffffff';
                ctx.font = "18px Arial";
                ctx.fillText(titulo, canvas.width / 2, canvas.height - 30);
            }

            function verificarEAtualizar() {
                $.getJSON(apiURL)
                    .done(function(data) {
                        let musica = "WEB RADIO POWER DANCE - Campo Grande MS";
                        if (data && data.musica_atual) {
                            musica = String(data.musica_atual);
                        }

                        let artista = "POWER DANCE";
                        let titulo = "Campo Grande MS";

                        if (musica.includes(" - ")) {
                            const partes = musica.split(" - ");
                            artista = partes[0].trim();
                            titulo = partes[1].trim();
                        } else {
                            artista = musica;
                        }

                        // Desenha direto o texto no Canvas, sem carregar nenhuma imagem externa aqui!
                        drawMetaToCanvas(artista, titulo);
                    })
                    .fail(function() {
                        // Plano B caso a API falhe: mostra os dados padrões da rádio
                        drawMetaToCanvas("POWER DANCE", "Sincronizando sinal...");
                    });
            }

            // Inicializa e define o loop de 5 segundos
            verificarEAtualizar();
            setInterval(verificarEAtualizar, 5000);
        });
    </script>
</body>
</html>
