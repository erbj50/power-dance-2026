<!DOCTYPE html>
<html lang="pt-br">
<head>
   <link rel="icon" type="image/x-icon" href="./image/fav-icon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        #wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 995px;
            height: 1800px;
            transform-origin: center center;
            /* Começa invisível para não dar o "flash" do tamanho original na tela */
            opacity: 0; 
            transition: opacity 0.1s ease-in-out;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>



<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registrado com sucesso!', reg))
        .catch(err => console.error('Falha ao registrar o Service Worker:', err));
    });
  }
</script>





</head>
<body>

    <div id="wrapper">
        <iframe src="power.html"></iframe>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const larguraOriginal = 995;
        const alturaOriginal = 1800;

        function ajustarZoomInstantaneo() {
            const larguraCelular = window.innerWidth;
            const alturaCelular = window.innerHeight;
            
            const escalaX = larguraCelular / larguraOriginal;
            const escalaY = alturaCelular / alturaOriginal;
            
            const escalaFinal = Math.min(escalaX, escalaY) * 0.99;
            
            wrapper.style.transform = `translate(-50%, -50%) scale(${escalaFinal})`;
            wrapper.style.opacity = '1'; // Torna visível já no tamanho correto
        }

        // 1. Execução imediata (assim que o navegador lê o script)
        ajustarZoomInstantaneo();

        // 2. Execução assim que a árvore do documento principal está pronta
        document.addEventListener('DOMContentLoaded', ajustarZoomInstantaneo);

        // 3. Execuções de segurança para mudanças de orientação (girar o celular)
        window.addEventListener('resize', ajustarZoomInstantaneo);
        window.addEventListener('orientationchange', ajustarZoomInstantaneo);
    </script>




    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
        });
    </script>



</body>
</html>
