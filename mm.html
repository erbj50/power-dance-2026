<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat de Recados</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 94vh;
      background-color: #f0f0f000;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 15px;
      background-color: rgba(15, 15, 118, 0.188);
    }
    .messagesContainer {
      flex: 1;
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column-reverse; /* Altera a direção para que as novas mensagens apareçam embaixo */
    }
    .message {
      border: 1px solid #fdfdfd00;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      color: rgba(240, 248, 255, 0.758);
      background-color: #ccb91100;
      position: relative;
      animation: marqueeUp 30s linear infinite;
      opacity: 0;
      display: none;
    }
    .message.active {
      display: block;
      opacity: 1;
    }
    .message img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      position: absolute;
      top: 10px;
      left: 10px;
    }
    .message .content {
      margin-left: 250px;
      font-size: 40px;
    }
    .message .name {
      font-weight: bold;
      color: #007BFF;
    }
    .message .email {
      color: #d4d117;
      font-size: 50px;
    }
    .message .timestamp {
      font-size: 0.8em;
      color: #100202;
    }
    .footer {
      display: flex;
      align-items: center;
      padding: 10px;
      background-color: rgb(161, 155, 155);
      border-top: 1px solid #a9dae2;
    }
    .footer textarea {
      flex: 1;
      height: 40px;
      padding: 10px;
      border: 5px solid #d80808;
      border-radius: 5px;
      font-size: 20px;
      resize: none;
    }
    .footer button {
      margin-left: 10px;
      padding: 16px 16px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      font-size: 30px;
      cursor: pointer;
    }
    .footer button:hover {
      background-color: #0056b3;
    }
    .notification {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #007BFF;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      z-index: 10;
      animation: fadeOut 3s ease-in-out;
    }
    @keyframes marqueeUp {
      0% { transform: translateY(0); }
      100% { transform: translateY(-980%); }
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; display: none; }
    }
    textarea {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="messagesContainer" id="messagesContainer"></div>
  </div>
  <div class="footer">
    <textarea id="messageInput" placeholder="Deixe seu recado (máximo 150 caracteres)" maxlength="150"></textarea>
    <button id="submitMessage">Enviar</button>
  </div>
  <div id="notificationContainer"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, get, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDMNEQL0Cj6eXtAISqtBpYiYbkEOoLkqM",
      authDomain: "recados-fca7e.firebaseapp.com",
      databaseURL: "https://recados-fca7e-default-rtdb.firebaseio.com",
      projectId: "recados-fca7e",
      storageBucket: "recados-fca7e.appspot.com",
      messagingSenderId: "637659136101",
      appId: "1:637659136101:web:ac2db24f4c9eef2efe068c",
      measurementId: "G-ZE733KFTMF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const bannedWords = [
      "seu negro", "mito", "MITO", "prostituta", "viado", "boiola", "bolsonaro", "ladrao", "talarico", "ruim", "pessimo", "péssimo", "paia", "bosta", "rola", "pica", "lixo", "zona", "sertanejo", "forró", "axé", "pagode", "baile", "funk", "foda", "buceta", "piroca", "jeba", "bonde", "roubo", "roubar", "assaltar", "estrupar", "estrupador", "traficante", "petista", "safado", "invasor", "traveco", "piranha", "biscate", "satanas", "diabo", "ateo", "atoa", "vagal", "cú", "cu", "bunda", "rabo", "rabão", "boasuda", "pix", "92", "93", "9", "67", "22", "refrigeração", "ar", "serviços", "mao", "mão", "pé", "salão", "mecanica",
      "oficina", "3", "negro", "piscina", "cade", "cade?", "deve", "paga", "ladrão", "lula", "Lula",
      "vadia", "janja", "jamja", "egoista", "cac", "nikolas", "esquerda", "direita", "mecânica", "bucetuda",
      "arrombado", "mercado", "chiqueiro", "http://", "https://",
    ];

    let messages = [];
    let currentIndex = 0;

    onAuthStateChanged(auth, user => {
      const input = document.getElementById('messageInput');
      const btn = document.getElementById('submitMessage');
      input.disabled = !user;
      btn.disabled = !user;
      if (user) showNotification(`${user.displayName} está online`);
    });

    document.getElementById('submitMessage').addEventListener('click', () => {
      const messageInput = document.getElementById('messageInput');
      const text = messageInput.value.trim();

      if (!text) {
        alert("Por favor, insira um recado.");
        return;
      }

      const words = text.toLowerCase().split(/\s+/);
      if (words.some(word => bannedWords.includes(word))) {
        alert("PALAVRA PROIBIDA! É extremamente proibido esse tipo de comentário ofensivo, político, religioso e comercial nesse Domain. Este chat é exclusivo para usuários sérios e de boa conduta. ATENÇÃO!! Você está sendo monitorado. 'AVISO!' Não cometa crimes.");
        return;
      }

      const user = auth.currentUser;
      if (!user) return;

      const message = {
        name: user.displayName,
        email: user.email,
        photoURL: user.photoURL || "",
        message: text,
        timestamp: new Date().toISOString()
      };

      push(ref(database, 'messages'), message)
        .then(() => {
          messageInput.value = "";
          messageInput.blur();
        })
        .catch(console.error);
    });

    const messagesContainer = document.getElementById('messagesContainer');

    onChildAdded(ref(database, 'messages'), snapshot => {
      const msg = snapshot.val();
      messages.push(msg);
      if (messages.length === 1) {
        displayMessage(0);
      }
    });

    function displayMessage(index) {
      const msg = messages[index];
      const el = document.createElement('div');
      el.className = 'message active';
      el.innerHTML = `
        <img src="${msg.photoURL}" alt="${msg.name}">
        <div class="content">
          <p class="name">${msg.name}</p>
          <p class="email">${msg.email}</p>
          <p>${msg.message.replace(/(.{20})/g, '$1<br>')}</p>
          <p class="timestamp"><small>${new Date(msg.timestamp).toLocaleString()}</small></p>
        </div>`;
      messagesContainer.appendChild(el);
      setTimeout(() => {
        el.classList.remove('active');
        setTimeout(() => {
          messagesContainer.removeChild(el);
          currentIndex = (currentIndex + 1) % messages.length;
          if (messages.length > 1) {
            displayMessage(currentIndex);
          }
        }, 990); // Tempo para remover a mensagem do DOM
      }, 12000); // Exibe cada mensagem por 12 segundos
    }

    function showNotification(text) {
      const el = document.createElement('div');
      el.className = 'notification';
      el.textContent = text;
      document.getElementById('notificationContainer').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    const messagesRef = ref(database, 'messages');
    onChildAdded(messagesRef, async (snapshot) => {
      const msg = snapshot.val();
      messages.push(msg);
      if (messages.length === 1) {
        displayMessage(0);
      }
      // 🔥 Remover mensagens antigas do Firebase (mantém as 10 mais recentes)
      const q = query(messagesRef, limitToLast(10));
      const snapshotLast10 = await get(q);
      const validKeys = new Set(Object.keys(snapshotLast10.val() || {}));
      const allMessagesSnapshot = await get(messagesRef);
      if (allMessagesSnapshot.exists()) {
        Object.entries(allMessagesSnapshot.val()).forEach(([key]) => {
          if (!validKeys.has(key)) {
            remove(ref(database, `messages/${key}`));
          }
        });
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Exibe o UID no console
        console.log("UID do usuário logado: ", user.uid);
      } else {
        console.log("Usuário não está logado.");
      }
    });
  </script>
  <script>
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || e.keyCode === 123) { // Verifica a tecla F12 por key ou keyCode
        e.preventDefault();
        return false; // Evita a propagação do evento
      }
    });
  </script>
</body>
</html>
