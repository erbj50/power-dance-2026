<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Painel Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #001f3f;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 30px;
      margin: 0;
      background-color: #003366;
    }

    .scroll-container {
      height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: rgba(57, 45, 3, 0.649);
      color: rgb(245, 239, 239);
      padding: 80px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      position: relative;
      font-size: 35px;
    }

    .card img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .card h3 {
      margin: 0 0 10px;
      color: #005bea;
    }

    .card p {
      margin: 5px 0;
    }

    .timestamp {
      font-size: 22px;
      color: #f20a0a;
      margin-top: 10px;
    }

    .card-footer {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
    }

    .card-footer button {
      padding: 6px 12px;
      font-size: 34px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-editar {
      background-color: #ffa500;
      color: white;
    }

    .btn-excluir {
      background-color: #dc3545;
      color: white;
    }

    .btn-deslogar {
      background-color: #6c757d;
      color: white;
    }

    .btn-editar:hover { background-color: #e69500; }
    .btn-excluir:hover { background-color: #c82333; }
    .btn-deslogar:hover { background-color: #5a6268; }
  </style>
</head>
<body>

  <h1>Admin</h1>

  <button id="logoutBtn" style="
  position: absolute;
  top: 20px;
  right: 20px;
  padding: 10px 20px;
  background-color: #ff6347;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
">Sair</button>

  <div class="scroll-container" id="cardContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getDatabase, ref, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDMNEQL0Cj6eXtAISqtBpYiYbkEOoLkqM",
      authDomain: "recados-fca7e.firebaseapp.com",
      projectId: "recados-fca7e",
      databaseURL: "https://recados-fca7e-default-rtdb.firebaseio.com",
      storageBucket: "recados-fca7e.appspot.com",
      messagingSenderId: "637659136101",
      appId: "1:637659136101:web:ac2db24f4c9eef2efe068c"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const messagesRef = ref(database, 'messages');
    const container = document.getElementById('cardContainer');

    onChildAdded(messagesRef, (snapshot) => {
      const data = snapshot.val();
      const key = snapshot.key;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${data.name}</h3>
        <p><strong>Email:</strong> ${data.email}</p>
        <p><strong>Mensagem:</strong> ${data.message}</p>
        <div class="timestamp">${new Date(data.timestamp).toLocaleString()}</div>
        <img src="${data.photoURL}" alt="avatar" />
        <div class="card-footer">
          <button class="btn-editar">Editar</button>
          <button class="btn-excluir">Excluir</button>
          <button class="btn-deslogar">Deslogar</button>
        </div>
      `;

      // Botão Excluir
      card.querySelector('.btn-excluir').addEventListener('click', async () => {
        if (confirm("Deseja excluir esta mensagem?")) {
          await remove(ref(database, `messages/${key}`));
          card.remove();
        }
      });

      // Botão Editar (simples prompt)
      card.querySelector('.btn-editar').addEventListener('click', async () => {
        const novoTexto = prompt("Editar mensagem:", data.message);
        if (novoTexto && novoTexto.trim() !== "") {
          await update(ref(database, `messages/${key}`), {
            message: novoTexto
          });
          card.querySelector("p:nth-of-type(2)").textContent = `Mensagem: ${novoTexto}`;
        }
      });

      // Botão Deslogar (opcional, depende da lógica de login implementada)
      card.querySelector('.btn-deslogar').addEventListener('click', () => {
        alert("Função de deslogar pode ser implementada via UID se necessário.");
      });


      container.prepend(card);
    });

//botao voltar
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
const auth = getAuth(app);

document.getElementById('logoutBtn').addEventListener('click', () => {
  signOut(auth).then(() => {
    window.location.href = 'landing.html';
  }).catch((error) => {
    alert("Erro ao sair: " + error.message);
  });
});





  </script>
</body>
</html>
