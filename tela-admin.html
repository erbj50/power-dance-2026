<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - ERBJ (Otimizador Corrigido)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: white;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-image: url('https://i.pinimg.com/originals/dd/dd/22/dddd220b1458dc3124516aa02528eecb.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
            zoom: 0.93; 
        }

        .admin-container {
            width: 100%;
            max-width: 995px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .preview-container {
            width: 360px;
            height: 350px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 2px dashed rgba(0, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: transparent;
        }

        .form-group {
            width: 100%;
            max-width: 400px;
            margin: 3px 0;
        }

        input, select, button {
            width: 100%;
            padding: 9px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        input, select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        button {
            background: rgba(0, 100, 255, 0.7);
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: rgba(0, 100, 255, 0.9);
        }

        .btn-migrar {
            background: rgba(255, 165, 0, 0.7);
            border: 1px solid orange;
            margin-bottom: 5px;
        }

        .gallery {
            width: 100%;
            height: 200px;
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            margin-top: 15px;
        }

        .gallery-item {
            min-width: 150px;
            height: 150px;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .gallery-id {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        #status {
            margin-top: 5px;
            color: lime;
            font-weight: bold;
            text-align: center;
        }

        .monitor-panel {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            transition: width 0.5s ease-in-out;
        }

        #fill-storage { background-color: #00ffcc; }
        #fill-slots { background-color: #ff00ff; }
        .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>
</head>
<body>
    <div class="admin-container">
        <h1>ADMIN - ERBJ</h1>

        <div class="preview-container" id="preview" onclick="document.getElementById('imgInput').click()">
            <img id="previewImg" class="hidden" />
        </div>

        <input type="file" id="imgInput" accept="image/*" class="hidden" />

        <div class="form-group">
            <input type="text" id="urlInput" placeholder="URL ou Número do WhatsApp" />
        </div>

        <div class="form-group">
            <select id="idSelect">
                <option value="">Selecione um ID (1 a 100)</option>
                <script>
                    for (let i = 1; i <= 100; i++) {
                        document.write(`<option value="${i}">${i}</option>`);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <button onclick="salvar()">Salvar / Atualizar</button>
            <button class="btn-migrar" onclick="iniciarMigracaoEmLote()">🔄 Otimizar Base</button>
        </div>

        <div id="status"></div>

        <div class="gallery" id="gallery"></div>

        <div class="monitor-panel" id="monitorPanel">
            <div class="monitor-row">
                <div>Espaço em Base64 ocupado no Firebase: <span id="txt-storage">0 MB</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="fill-storage"></div></div>
            </div>
            <div class="monitor-row" style="margin-top:10px;">
                <div>Painel de IDs Utilizados: <span id="txt-slots">0 slots</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="fill-slots"></div></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        // Força a limpeza do localStorage entupido para destravar o navegador imediatamente
        localStorage.clear();

        const firebaseConfig = {
            apiKey: "AIzaSyCNChOQgMaJcGVJ8e9WPWRH_XSrSInvPiY",
            authDomain: "power-adm-galery.firebaseapp.com",
            databaseURL: "https://power-adm-galery-default-rtdb.firebaseio.com",
            projectId: "power-adm-galery",
            storageBucket: "power-adm-galery.appspot.com",
            messagingSenderId: "530702563824",
            appId: "1:530702563824:web:d4b9458c33593ba78dc535"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let imageData = ""; 
        
        // Mapeamento mantido em memória RAM, sem tocar no localStorage perigoso
        let cacheUrlsLocais = {}; 
        const imgVaziaSVG = "data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22150%22%20height%3D%22150%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20150%20150%22%3E%3Crect%20width%3D%22150%22%20height%3D%22150%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2275%22%20y%3D%2275%22%20text-anchor%3D%22middle%22%20fill%3D%22white%22%20font-size%3D%2212%22%3EVazio%3C%2Ftext%3E%3C%2Fsvg%3E";

        document.getElementById('imgInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) processarImagem(file);
        });

        async function processarImagem(file) {
            const fileName = file.name.toLowerCase();
            const isGif = fileName.endsWith('.gif') || file.type === 'image/gif';
            
            document.getElementById('status').innerHTML = "⌛ Analisando arquivo...";

            // Trava de segurança Realtime contra abusos de arquivos brutos
            const tamanhoMB = file.size / (1024 * 1024);
            if (isGif && tamanhoMB > 1.8) {
                document.getElementById('status').innerHTML = `<span style='color:red;'>❌ GIF bloqueado (${tamanhoMB.toFixed(2)}MB).<br>Como o navegador não reduz GIFs animados sem quebrar a animação, diminua o peso dele para menos de 1.5MB no <strong>ezgif.com</strong> antes de subir!</span>`;
                imageData = "";
                document.getElementById('imgInput').value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                definirImagemPreview(event.target.result, isGif ? "✨ GIF Animado aceito dentro do limite de segurança!" : "✨ Imagem carregada!");
            };
            reader.readAsDataURL(file);
        }

        function definirImagemPreview(stringBase64, mensagemStatus) {
            document.getElementById('previewImg').src = stringBase64;
            document.getElementById('previewImg').classList.remove('hidden');
            imageData = stringBase64;
            document.getElementById('status').innerHTML = mensagemStatus;
        }

        // Função corrigida mapeando as variáveis que deram erro no console
        function carregarDadosNoFormulario(id) {
            document.getElementById('idSelect').value = id;
            document.getElementById('status').textContent = `⌛ Buscando ID ${id}...`;

            db.ref(`dados/${id}`).once("value").then(snapshot => {
                const data = snapshot.val();
                if (data && data.img) {
                    document.getElementById('previewImg').src = data.img;
                    document.getElementById('previewImg').classList.remove('hidden');
                    imageData = data.img;
                    let urlTratada = data.url || "";
                    if (urlTratada.startsWith("__whatsapp__")) {
                        try { urlTratada = atob(urlTratada.replace("__whatsapp__", "")).replace("+", ""); } catch(e){}
                    }
                    document.getElementById('urlInput').value = urlTratada;
                    document.getElementById('status').textContent = `✅ ID ${id} carregado!`;
                } else {
                    document.getElementById('previewImg').classList.add('hidden');
                    imageData = "";
                    document.getElementById('urlInput').value = "";
                    document.getElementById('status').textContent = `⚠️ ID ${id} está vazio.`;
                }
            }).catch(() => {
                document.getElementById('status').textContent = "❌ Erro ao buscar dados.";
            });
        }

        function salvar() {
            const id = document.getElementById('idSelect').value;
            let url = document.getElementById('urlInput').value.trim();

            if (!id) return alert("Selecione um ID.");
            if (!imageData && !url) return alert("Selecione uma imagem ou digite uma URL.");

            const apenasNumeros = url.replace(/[^\d]+/g, "");
            if (apenasNumeros.length >= 10 && apenasNumeros.length <= 15) {
                url = `__whatsapp__${btoa(`+${apenasNumeros}`)}`;
            }

            document.getElementById('status').textContent = "💾 Salvando no Realtime Database...";
            const dadosParaSalvar = { img: imageData || "", url: url || "" };

            db.ref(`dados/${id}`).set(dadosParaSalvar).then(() => {
                document.getElementById('status').textContent = "✅ Salvo com sucesso!";
                
                cacheUrlsLocais[id] = {
                    url: url || "tem_imagem",
                    dataInclusao: new Date().toLocaleDateString('pt-BR')
                };
                atualizarMiniaturaNaTela(id, dadosParaSalvar.img);
            }).catch(() => {
                document.getElementById('status').textContent = "❌ Erro ao salvar.";
            });
        }

        function atualizarBarrasMonitoramento(snapshotBanco) {
            if (!snapshotBanco.exists()) return;
            const todosOsDados = snapshotBanco.val();
            let totalCaracteresTexto = 0;
            let slotsOcupadosContador = 0;

            Object.keys(todosOsDados).forEach(id => {
                const registro = todosOsDados[id];
                if (registro && registro.img) {
                    totalCaracteresTexto += registro.img.length;
                    slotsOcupadosContador++;
                }
            });

            const totalMegabytes = totalCaracteresTexto / (1024 * 1024);
            const porcetagemArmazenamento = Math.min((totalMegabytes / 1024) * 100, 100);
            
            document.getElementById('fill-storage').style.width = `${porcetagemArmazenamento}%`;
            document.getElementById('txt-storage').innerHTML = `<strong>${totalMegabytes.toFixed(2)} MB</strong> ocupados`;
            document.getElementById('fill-slots').style.width = `${slotsOcupadosContador}%`;
            document.getElementById('txt-slots').innerHTML = `<strong>${slotsOcupadosContador}</strong> de 100 em uso`;
        }

        function atualizarMiniaturaNaTela(id, imgBase64) {
            const galleryItem = document.getElementById(`item-${id}`);
            if (galleryItem) {
                const imgNode = galleryItem.querySelector("img");
                imgNode.src = imgBase64 || imgVaziaSVG;
                imgNode.style.opacity = imgBase64 ? "1" : "0.5";
            }
        }

        async function iniciarMigracaoEmLote() {
            alert("Sua base já está operando de forma otimizada na nuvem!");
        }

        function inicializarSistema() {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";
            for (let id = 1; id <= 100; id++) {
                const galleryItem = document.createElement("div");
                galleryItem.className = "gallery-item";
                galleryItem.id = `item-${id}`;
                galleryItem.innerHTML = `<span class="gallery-id">${id}</span><img src="${imgVaziaSVG}" style="opacity:0.5;">`;
                galleryItem.onclick = function() { carregarDadosNoFormulario(id); };
                gallery.appendChild(galleryItem);
            }

            db.ref("dados/").on("value", snapshot => {
                for(let i=1; i<=100; i++) atualizarMiniaturaNaTela(i, null);
                if (snapshot.exists()) {
                    snapshot.forEach(childSnapshot => {
                        atualizarMiniaturaNaTela(childSnapshot.key, childSnapshot.val().img);
                    });
                    atualizarBarrasMonitoramento(snapshot);
                }
            });
        }

        inicializarSistema();
    </script>
</body>
</html>
